name: MLOps Pipeline

on:
  push:
    branches: [main]
    # paths:
    #   - 'data/**.dvc'
    #   - 'src/**.py'
    #   - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          echo "$CLOUD_CREDENTIALS" > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'sqlite:///mlflow.db' }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload candidate model and metrics
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          client = storage.Client()
          bucket = client.bucket(os.environ["CLOUD_BUCKET"])
          
          # Upload candidate model (NOT latest yet)
          bucket.blob("models/candidate/model.pkl").upload_from_filename("models/model.pkl")
          
          # Upload metrics for eval job
          bucket.blob("models/candidate/metrics.json").upload_from_filename("outputs/metrics.json")
          
          print("Candidate artifacts uploaded.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save report as artifact (Bonus 3)
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Cloud Storage
        run: |
          echo "$CLOUD_CREDENTIALS" > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Download metrics for comparison
        run: |
          gsutil cp gs://$CLOUD_BUCKET/models/candidate/metrics.json candidate_metrics.json
          gsutil cp gs://$CLOUD_BUCKET/models/latest/metrics.json latest_metrics.json || echo "{}" > latest_metrics.json
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        continue-on-error: true

      - name: Check eval gate (Bonus 4 & Bonus 2)
        run: |
          python - <<'EOF'
          import json
          import os

          with open('candidate_metrics.json') as f:
            new_metrics = json.load(f)
          try:
            with open('latest_metrics.json') as f:
              old_metrics = json.load(f)
          except:
            old_metrics = {}

          new_acc = new_metrics.get('accuracy', 0)
          old_acc = old_metrics.get('accuracy', 0)
          
          print(f"New Accuracy: {new_acc:.4f}")
          print(f"Old Accuracy: {old_acc:.4f}")

          # 1. Fixed Threshold (0.70)
          if new_acc < 0.70:
            raise SystemExit(f"FAILED: accuracy {new_acc:.4f} < 0.70.")
          
          # 2. Rollback Check (Bonus 4)
          if new_acc < old_acc:
            raise SystemExit(f"FAILED: accuracy decreased ({new_acc:.4f} < {old_acc:.4f}). Hủy deploy.")
          
          print("PASSED: Candidate is better or equal to latest.")
          EOF

      - name: Promote candidate to latest
        run: |
          gsutil cp gs://$CLOUD_BUCKET/models/candidate/model.pkl gs://$CLOUD_BUCKET/models/latest/model.pkl
          gsutil cp gs://$CLOUD_BUCKET/models/candidate/metrics.json gs://$CLOUD_BUCKET/models/latest/metrics.json
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}




  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
